- name: Create dedicated Ansible deployment user
  hosts: all
  remote_user: "{{ lookup('ansible.builtin.env', 'remote_user', default='ansible_user') }}"
  become: true

  tasks:
    - name: Ensure the '{{ remote_user }}' group exists
      ansible.builtin.group:
        name: "{{ remote_user }}"
        state: present

    - name: Create the '{{ remote_user }}' account
      ansible.builtin.user:
        name: "{{ remote_user }}"
        shell: /bin/bash
        group: "{{ remote_user }}"
        groups: sudo
        append: true
        state: present

    - name: Deploy all local public SSH keys to the new user
      ansible.posix.authorized_key:
            user: "{{ remote_user }}"
            state: present
            key: "{{ lookup('file', item) }}"
      with_fileglob:
            - "~/.ssh/*.pub"

    - name: Allow '{{ remote_user }}' to use sudo without a password prompt
      ansible.builtin.lineinfile:
        path: "/etc/sudoers.d/{{ remote_user }}"
        line: "{{ remote_user }} ALL=(ALL) NOPASSWD:ALL"
        validate: "visudo -cf %s"
        create: true
        mode: '0440'